name: Add issues to Data Source Plugins team project
on:
  issues:
    types:
      - opened
  pull_request:
    types:
      - opened

jobs:
  add-to-project:
    permissions:
      contents: read
      id-token: write
    name: Add issue to Data Source Plugins project
    runs-on: ubuntu-latest
    steps:
      - id: get-github-token
        uses: grafana/shared-workflows/actions/create-github-app-token@259ba21cb3ff07724f331e26d926d655d24b317b # create-github-app-token/v0.2.3
        with:
          github_app: grafana-oss-big-tent
      - name: Add to project
        uses: actions/add-to-project@1f2db0f17f4dca7786abfab9ca41e2bdcca1e27a # main
        with:
          project-url: https://github.com/orgs/grafana/projects/1085
          github-token: ${{ steps.get-github-token.outputs.token }}
